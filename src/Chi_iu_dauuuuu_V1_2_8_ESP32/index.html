<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chọn WiFi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-weight: 400; /* ✨ Không để mặc định bold */
  background-color: #f2f2f7;
  color: #000;
  padding: 20px;
}

    h2 {
      color: #007aff;
      font-size: 20px;
  	font-weight: 600;
  letter-spacing: -0.2px;
      text-align: center;
      margin-bottom: 20px;
    }

    #loading {
      text-align: center;
      margin: 10px 0;
      color: #007aff;
      font-style: italic;
      display: none;
    }

    .ssid-btn {
      background: #fff;
      border: 1px solid #ccc;
      padding: 14px;
      margin: 6px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
	font-weight: 500; /* Mặc định iOS xài khoảng Medium */
    }

    .ssid-btn:hover {
      background-color: #e5f1ff;
    }

    .ssid-btn.selected {
      border-color: #007aff;
      background-color: #d9ecff;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-weight: 500;
 	 font-size: 17px;
    }

    button {
      background: #007aff;
      color: white;
      border: none;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #005fcc;
    }

    #scan-btn {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>Chọn WiFi</h2>

  <button id="scan-btn">🔍 Quét WiFi</button>
  <div id="loading">🔄 Đang quét WiFi...</div>
  <div id="wifi-list"></div>
  
  <form method="POST" action="/wifi" id="wifi-form">
    <input type="text" id="ssid" name="ssid" placeholder="SSID" required>
    <input type="password" name="pass" placeholder="Password" required>
    <button type="submit">Kết nối WiFi</button>
  </form>

 <script>
  const loadingDiv = document.getElementById('loading');
  const wifiList = document.getElementById('wifi-list');
  const scanBtn = document.getElementById('scan-btn');
  const ssidInput = document.getElementById('ssid');

  function getSignalIcon(rssi) {
    if (rssi >= -55) return '📶📶📶';     // Mạnh
    else if (rssi >= -65) return '📶📶';
    else if (rssi >= -75) return '📶';
    else return ' ';                      // Yếu
  }

  function scanWiFi() {
    wifiList.innerHTML = '';
    loadingDiv.style.display = 'block';

    fetch('/scan')
      .then(r => r.json())
      .then(data => {
        loadingDiv.style.display = 'none';

        if (data.length === 0) {
          wifiList.innerHTML = '<div style="text-align:center; color:#888">Không tìm thấy WiFi nào</div>';
          return;
        }

        // ✅ Sắp xếp theo RSSI giảm dần
        data.sort((a, b) => b.rssi - a.rssi);

        data.forEach(item => {
          const btn = document.createElement('div');
          btn.className = 'ssid-btn';
          btn.innerHTML = `
            <strong>${item.ssid}</strong> 
            ${item.secure ? '🔒' : '🔓'} 
            <span style="float:right;">${getSignalIcon(item.rssi)}</span>
          `;
          btn.onclick = () => {
            ssidInput.value = item.ssid;

            // Highlight
            document.querySelectorAll('.ssid-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            // Scroll xuống form
            document.getElementById('wifi-form').scrollIntoView({ behavior: 'smooth' });
          };
          wifiList.appendChild(btn);
        });
      })
      .catch(err => {
        loadingDiv.innerText = "❌ Lỗi khi quét WiFi.";
        console.error("WiFi scan error:", err);
      });
  }

  // ✅ Quét khi bấm nút
  scanBtn.onclick = scanWiFi;

  // ✅ Quét tự động khi mở trang
  window.addEventListener('load', scanWiFi);
</script>
</body>
</html>
