<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Đang kết nối...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f2f2f7;
      color: #000;
      padding: 30px;
      text-align: center;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      display: inline-block;
      max-width: 90%;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ccc;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .msg {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <div class="msg" id="msg">Đang kết nối tới WiFi...</div>
  </div>

  <script>
    function checkStatus() {
      fetch('/status')
      .then(res => res.text())
      .then(status => {
        if(status === 'success') {
          window.location.href = '/success';
        } else if(status === 'failed') {  document.getElementById('msg').innerText = 'Kết nối thất bại, vui lòng thử lại.';
  setTimeout(() => {
    window.location.href = "/";
  }, 2000);
        } else {
          setTimeout(checkStatus, 2000);
        }
      });
    }
    checkStatus();
  </script>
</body>
</html>
