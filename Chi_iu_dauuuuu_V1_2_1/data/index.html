<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chọn WiFi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f2f2f7; color: #000; padding: 20px; }
    h2 { color: #007aff; }
    .ssid-btn {
      background: #fff;
      border: 1px solid #ccc;
      padding: 12px;
      margin: 5px 0;
      border-radius: 12px;
      cursor: pointer;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #007aff;
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <h2>Chọn WiFi</h2>
  <div id="wifi-list"></div>
  <form method="POST" action="/wifi">
    <input type="text" id="ssid" name="ssid" placeholder="SSID" required readonly><br>
    <input type="password" name="pass" placeholder="Password" required><br>
    <button type="submit">Kết nối</button>
  </form>

  <script>
    fetch('/scan').then(r => r.json()).then(data => {
      let list = document.getElementById('wifi-list');
      data.forEach(ssid => {
        let btn = document.createElement('div');
        btn.className = 'ssid-btn';
        btn.innerText = ssid;
        btn.onclick = () => document.getElementById('ssid').value = ssid;
        list.appendChild(btn);
      });
    });
  </script>
</body>
</html>
