<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kết nối thành công</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f2f2f7;
      color: #000;
      padding: 30px;
      text-align: center;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      display: inline-block;
      max-width: 90%;
    }

    .status-icon {
      font-size: 48px;
      margin-bottom: 12px;
      color: #28a745;
    }

    .ssid {
      font-weight: bold;
      word-break: break-word;
      font-size: 18px;
      margin-top: 8px;
    }

    .msg {
      font-size: 17px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-icon">✅</div>
    <div class="msg">Kết nối đc òi á</div>
    <div class="ssid">❤️  ❤️  ❤️</div>
  </div>
</body>
</html>
